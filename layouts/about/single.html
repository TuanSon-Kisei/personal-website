{{ define "main" }}
<div class="about-section">
    <article>
        <h1>{{ .Params.title }}</h1>
        {{ .Content }}
    </article>
    <div class="about-image">
        {{ if .Params.image }}
            {{ $image := resources.Get .Params.image }}
            {{ if $image }}
            <img src="{{ $image.RelPermalink}}" alt="An image of the author doing portrait shoot">
            {{ end }}
        {{ end }}
    </div>
</div>
{{ end }}
