<footer class="[ site_footer ]">
    <div class="[ wrapper ] [ flow ] [ footer__wrapper ]">
        <div class="[ footer-container_contacts ] [ text-center ]">
            <address>
                Connect with me on
                <a
                    href="https://www.linkedin.com/in/tuansonnguyen/"
                    rel="me"
                    target="_blank"
                    rel="noopener noreferrer"
                    >LinkedIn</a
                >,
                <a
                    href="https://gitlab.com/DoctorKisei"
                    rel="me"
                    target="_blank"
                    rel="noopener noreferrer"
                    >Gitlab</a
                >,
                <a
                    rel="me"
                    href="https://mstdn.social/@drkisei"
                    target="_blank"
                    rel="noopener noreferrer"
                    >Mastodon</a
                >
                or
                <a
                    href="mailto:kisei.tuanson.work@gmail.com"
                    rel="me"
                    target="_blank"
                    rel="noopener noreferrer"
                    >Email</a
                >
            </address>
        </div>

        <nav class="[ footer-container_web-badges ] [ center ] [ cluster ]">
            {{ range hugo.Data.footer.images }} {{ if .url }}
            <a href="{{ .url }}" target="_blank" rel="noopener noreferrer"
                ><img
                    src="{{ .src }}"
                    alt="{{ .alt }}"
                    loading="lazy"
                    decoding="async"
            /></a>
            {{ else }}
            <img
                src="{{ .src }}"
                alt="{{ .alt }}"
                loading="lazy"
                decoding="async"
            />
            {{ end }} {{ end }}
        </nav>
        <p class="[ footer-container_author ] [ text-center ]">
            2026, made with grit and love by Kisei
        </p>
        <div
            class="[ footer-container_ribbon ]"
            xmlns="http://www.w3.org/2000/svg"
            role="img"
            aria-hidden="true"
            preserveAspectRatio="none"
            height="15"
            width="100%"
        >
            <title>Decorative footer ribbon</title>
        </div>
    </div>
</footer>
