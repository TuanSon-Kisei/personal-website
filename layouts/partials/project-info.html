<div class="[ project-info ]">

        <li>
            <strong class="project-meta__label">Role:</strong>
            <span class="project-meta__value">{{ $.Page.Params.role }}</span>
        </li>

        <li>
            <strong class="project-meta__label">Timeline:</strong>
            <span class="project-meta__value"
                >{{ $.Page.Params.timeline }}</span
            >
        </li>
    </ul>
</div>
