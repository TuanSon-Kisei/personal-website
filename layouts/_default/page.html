{{ define "main" }}
<section class="page-wrapper">
    {{ partial "breadcrumb.html" . }}
    <main class="project-content">
        {{ if .Params.Toc}}
        <aside id="table-of-contents">{{ .TableOfContents }}</aside>
        {{ end }}

        <article>
            <div class="project-summary">
                <h1>{{ .Title }}</h1>
                <h5>{{ .Params.description }}</h5>
            </div>
            {{ .Content }}
        </article>
    </main>
</section>
{{ end }}
