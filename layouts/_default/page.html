{{ define "main" }}
<section class="page-wrapper">
    {{ partial "breadcrumb.html" . }}
    <main class="project-content">
        <article>
            <header class="project-summary">
                <h1 class="project-summary_title">{{ .Title }}</h1>
                <p class="project-summary_description">
                    {{ .Params.description }}
                </p>
            </header>
            {{ .Content }}
        </article>
    </main>
</section>
{{ end }}
