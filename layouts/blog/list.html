{{ define "main" }}
<div class="wrapper flow center blog-wrapper">
    <header>
        <h1 class="p-name">Blog</h1>
        <p>Writings, rantings, reflections. Coming from me.</p>
    </header>
    <div class="center flow blog-list">
        {{ range .Pages }}
        <article class="h-entry">
            <a href="{{ .RelPermalink }}" class="flow box blog-box u-url">
                <h2 class="text-h3 p-name">{{ .Title }}</h2>
                <div class="cluster blog-box--metadata">
                    <div class="with-icon">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-calendar-heart-icon lucide-calendar-heart icon"
                        >
                            <path
                                d="M12.127 22H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v5.125"
                            />
                            <path
                                d="M14.62 18.8A2.25 2.25 0 1 1 18 15.836a2.25 2.25 0 1 1 3.38 2.966l-2.626 2.856a.998.998 0 0 1-1.507 0z"
                            />
                            <path d="M16 2v4" />
                            <path d="M3 10h18" />
                            <path d="M8 2v4" />
                        </svg>
                        <time class="dt-published"
                            >{{ .Date.Format "Jan 02, 2006" }}</time
                        >
                    </div>
                    <div class="with-icon">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-hourglass-icon lucide-hourglass icon"
                        >
                            <path d="M5 22h14" />
                            <path d="M5 2h14" />
                            <path
                                d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"
                            />
                            <path
                                d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"
                            />
                        </svg>
                        <span>{{ .ReadingTime }} minutes read</span>
                    </div>
                </div>
                <p class="p-summary">{{ .Description }}</p>
            </a>
        </article>
        {{ end }}
    </div>
</div>
{{ end }}
